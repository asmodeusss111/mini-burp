<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini Burp — Security Scanner</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230d1117'/%3E%3Ctext x='4' y='26' font-size='22'%3E%F0%9F%94%92%3C/text%3E%3C/svg%3E" />

    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg:      #0d1117;
        --panel:   #161b22;
        --border:  #30363d;
        --accent:  #f97316;
        --accent2: #fb923c;
        --text:    #e6edf3;
        --muted:   #8b949e;
        --green:   #3fb950;
        --red:     #f85149;
        --blue:    #58a6ff;
        --purple:  #a371f7;
      }

      html, body {
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
        overflow-x: hidden;
      }

      /* ── Loading screen ─────────────────────────────────── */
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: var(--bg);
        transition: opacity .7s ease, visibility .7s ease;
        gap: 0;
      }
      #splash.hidden { opacity: 0; visibility: hidden; }

      /* Radial glow behind icon */
      #splash::before {
        content: '';
        position: absolute;
        width: 340px;
        height: 340px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(88,166,255,.08) 0%, rgba(163,113,247,.06) 50%, transparent 70%);
        pointer-events: none;
        filter: blur(20px);
      }

      .splash-icon {
        width: 72px;
        height: 72px;
        margin-bottom: 32px;
        position: relative;
        z-index: 1;
      }
      .splash-icon svg {
        width: 72px;
        height: 72px;
        animation: splashSpin 8s linear infinite;
        filter: drop-shadow(0 0 14px rgba(88,166,255,.45));
      }
      .splash-icon-inner {
        position: absolute;
        inset: 18px;
        animation: splashPulse 2s ease-in-out infinite;
      }

      .splash-title {
        font-size: 30px;
        font-weight: 700;
        letter-spacing: 10px;
        background: linear-gradient(135deg, #58a6ff 0%, #a371f7 50%, #06b6d4 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 8px;
        position: relative;
        z-index: 1;
      }
      .splash-sub {
        color: var(--muted);
        font-size: 10px;
        letter-spacing: 3px;
        margin-bottom: 40px;
        text-transform: uppercase;
        z-index: 1;
        position: relative;
      }
      .splash-lines {
        display: flex;
        flex-direction: column;
        gap: 7px;
        width: 260px;
        margin-bottom: 24px;
        position: relative;
        z-index: 1;
      }
      .splash-line {
        font-size: 11px;
        color: #4a5568;
        opacity: 0;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .splash-line.ok   { color: #3fb950; }
      .splash-line.show { animation: lineFadeIn .35s ease forwards; }
      .splash-line::before { content: '›'; color: #58a6ff; font-size: 14px; }
      .splash-bar {
        width: 260px;
        height: 1px;
        background: #1e2530;
        border-radius: 2px;
        overflow: hidden;
        position: relative;
        z-index: 1;
      }
      .splash-bar-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #58a6ff, #a371f7, #06b6d4);
        border-radius: 2px;
        transition: width .4s cubic-bezier(.4,0,.2,1);
        box-shadow: 0 0 8px rgba(88,166,255,.6);
      }
      @keyframes splashSpin {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }
      @keyframes splashPulse {
        0%,100% { opacity: .7; transform: scale(.9); }
        50%      { opacity: 1;  transform: scale(1.1); }
      }
      @keyframes lineFadeIn {
        from { opacity: 0; transform: translateX(-8px); }
        to   { opacity: 1; transform: translateX(0); }
      }

      /* ── Root ───────────────────────────────────────────── */
      #root { min-height: 100vh; }

      /* ── Grid background ────────────────────────────────── */
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background-image:
          linear-gradient(var(--border) 1px, transparent 1px),
          linear-gradient(90deg, var(--border) 1px, transparent 1px);
        background-size: 40px 40px;
        opacity: .18;
        mask-image: radial-gradient(ellipse 80% 70% at 50% 0%, black 40%, transparent 100%);
      }

      /* ── Glow orbs ──────────────────────────────────────── */
      body::after {
        content: '';
        position: fixed;
        top: -160px;
        left: 50%;
        transform: translateX(-50%);
        width: 700px;
        height: 400px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(249,115,22,.12) 0%, rgba(163,113,247,.07) 50%, transparent 70%);
        pointer-events: none;
        z-index: 0;
        filter: blur(30px);
      }

      /* ── Scrollbar ──────────────────────────────────────── */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: var(--bg); }
      ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

      /* ── Animations ─────────────────────────────────────── */
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50%       { transform: translateY(-8px); }
      }
      @keyframes load {
        0%   { width: 0%; }
        60%  { width: 75%; }
        100% { width: 100%; }
      }
      @keyframes pulse {
        0%, 100% { opacity: .3; transform: scale(.8); }
        50%       { opacity: 1;  transform: scale(1.2); }
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0; }
      }
      @keyframes scanline {
        0%   { top: -4px; }
        100% { top: 100%; }
      }
      @keyframes fadein {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* ── Scanline effect ────────────────────────────────── */
      .scanline {
        position: fixed;
        left: 0; right: 0;
        height: 4px;
        background: linear-gradient(transparent, rgba(249,115,22,.06), transparent);
        pointer-events: none;
        z-index: 1;
        animation: scanline 8s linear infinite;
      }

      /* ── App wrapper (passed down to React) ─────────────── */
      #app-wrapper {
        position: relative;
        z-index: 1;
        animation: fadein .4s ease .2s both;
      }

      /* ── Selection color ────────────────────────────────── */
      ::selection {
        background: rgba(249,115,22,.25);
        color: var(--text);
      }

      /* ── React component globals ────────────────────────── */
      select option { background: var(--panel); }
    </style>
  </head>
  <body>

    <!-- Animated scanline overlay -->
    <div class="scanline"></div>

    <!-- Splash / loading screen -->
    <div id="splash">
      <div class="splash-icon">
        <!-- Outer dashed ring (rotates) -->
        <svg viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="36" cy="36" r="34" stroke="url(#g1)" stroke-width="1" stroke-dasharray="5 4" opacity="0.5"/>
          <circle cx="36" cy="36" r="26" stroke="url(#g2)" stroke-width="1" opacity="0.35"/>
          <defs>
            <linearGradient id="g1" x1="0" y1="0" x2="72" y2="72" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#58a6ff"/>
              <stop offset="100%" stop-color="#a371f7"/>
            </linearGradient>
            <linearGradient id="g2" x1="0" y1="0" x2="72" y2="72" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#a371f7"/>
              <stop offset="100%" stop-color="#06b6d4"/>
            </linearGradient>
          </defs>
          <!-- Crosshair lines -->
          <line x1="36" y1="2"  x2="36" y2="16" stroke="#58a6ff" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
          <line x1="36" y1="56" x2="36" y2="70" stroke="#58a6ff" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
          <line x1="2"  y1="36" x2="16" y2="36" stroke="#58a6ff" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
          <line x1="56" y1="36" x2="70" y2="36" stroke="#58a6ff" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
          <!-- Center dot -->
          <circle cx="36" cy="36" r="3.5" fill="url(#g1)"/>
          <circle cx="36" cy="36" r="7" stroke="url(#g2)" stroke-width="1" opacity="0.5"/>
        </svg>
      </div>
      <div class="splash-title">MINI BURP</div>
      <div class="splash-sub">Security Scanner — Community Edition</div>
      <div class="splash-lines" id="splash-lines">
        <div class="splash-line" id="sl-1">Initializing engine...</div>
        <div class="splash-line" id="sl-2">Loading modules...</div>
        <div class="splash-line" id="sl-3">Checking proxy...</div>
        <div class="splash-line ok" id="sl-4">Ready.</div>
      </div>
      <div class="splash-bar"><div class="splash-bar-fill" id="splash-fill"></div></div>
    </div>

    <!-- React mounts here -->
    <div id="app-wrapper">
      <div id="root"></div>
    </div>

    <script type="module" src="/src/main.jsx"></script>

    <script>
      const steps = [
        { id: 'sl-1', delay: 200,  fill: 25 },
        { id: 'sl-2', delay: 550,  fill: 55 },
        { id: 'sl-3', delay: 900,  fill: 80 },
        { id: 'sl-4', delay: 1200, fill: 100 },
      ];
      steps.forEach(({ id, delay, fill }) => {
        setTimeout(() => {
          const el = document.getElementById(id);
          if (el) el.classList.add('show');
          const bar = document.getElementById('splash-fill');
          if (bar) bar.style.width = fill + '%';
        }, delay);
      });
      window.addEventListener('load', () => {
        setTimeout(() => {
          const s = document.getElementById('splash');
          if (s) s.classList.add('hidden');
        }, 1700);
      });
    </script>
  </body>
</html>
