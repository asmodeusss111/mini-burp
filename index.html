<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini Burp — Security Scanner</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230d1117'/%3E%3Ctext x='4' y='26' font-size='22'%3E%F0%9F%94%92%3C/text%3E%3C/svg%3E" />

    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg:      #0d1117;
        --panel:   #161b22;
        --border:  #30363d;
        --accent:  #f97316;
        --accent2: #fb923c;
        --text:    #e6edf3;
        --muted:   #8b949e;
        --green:   #3fb950;
        --red:     #f85149;
        --blue:    #58a6ff;
        --purple:  #a371f7;
      }

      html, body {
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
        overflow-x: hidden;
      }

      /* ── Loading screen ─────────────────────────────────── */
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: var(--bg);
        transition: opacity .6s ease, visibility .6s ease;
        gap: 0;
      }
      #splash.hidden { opacity: 0; visibility: hidden; }

      .splash-icon {
        width: 64px;
        height: 64px;
        margin-bottom: 28px;
        position: relative;
      }
      .splash-icon svg {
        width: 64px;
        height: 64px;
        filter: drop-shadow(0 0 12px rgba(249,115,22,.5));
        animation: splashPulse 2s ease-in-out infinite;
      }
      .splash-title {
        font-size: 28px;
        font-weight: 700;
        letter-spacing: 8px;
        color: var(--text);
        margin-bottom: 6px;
        position: relative;
      }
      .splash-title span.accent { color: var(--accent); }
      .splash-sub {
        color: var(--muted);
        font-size: 10px;
        letter-spacing: 3px;
        margin-bottom: 36px;
        text-transform: uppercase;
      }
      .splash-lines {
        display: flex;
        flex-direction: column;
        gap: 6px;
        width: 260px;
        margin-bottom: 28px;
      }
      .splash-line {
        font-size: 11px;
        color: var(--muted);
        opacity: 0;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .splash-line.ok   { color: var(--green); }
      .splash-line.show { animation: lineFadeIn .3s ease forwards; }
      .splash-line::before { content: '>'; color: var(--accent); }
      .splash-bar {
        width: 260px;
        height: 2px;
        background: var(--border);
        border-radius: 2px;
        overflow: hidden;
      }
      .splash-bar-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, var(--accent), var(--purple));
        border-radius: 2px;
        transition: width .3s ease;
      }
      @keyframes splashPulse {
        0%,100% { filter: drop-shadow(0 0 8px rgba(249,115,22,.4)); transform: scale(1); }
        50%      { filter: drop-shadow(0 0 20px rgba(249,115,22,.8)); transform: scale(1.05); }
      }
      @keyframes lineFadeIn {
        from { opacity: 0; transform: translateX(-6px); }
        to   { opacity: 1; transform: translateX(0); }
      }

      /* ── Root ───────────────────────────────────────────── */
      #root { min-height: 100vh; }

      /* ── Grid background ────────────────────────────────── */
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background-image:
          linear-gradient(var(--border) 1px, transparent 1px),
          linear-gradient(90deg, var(--border) 1px, transparent 1px);
        background-size: 40px 40px;
        opacity: .18;
        mask-image: radial-gradient(ellipse 80% 70% at 50% 0%, black 40%, transparent 100%);
      }

      /* ── Glow orbs ──────────────────────────────────────── */
      body::after {
        content: '';
        position: fixed;
        top: -160px;
        left: 50%;
        transform: translateX(-50%);
        width: 700px;
        height: 400px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(249,115,22,.12) 0%, rgba(163,113,247,.07) 50%, transparent 70%);
        pointer-events: none;
        z-index: 0;
        filter: blur(30px);
      }

      /* ── Scrollbar ──────────────────────────────────────── */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: var(--bg); }
      ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

      /* ── Animations ─────────────────────────────────────── */
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50%       { transform: translateY(-8px); }
      }
      @keyframes load {
        0%   { width: 0%; }
        60%  { width: 75%; }
        100% { width: 100%; }
      }
      @keyframes pulse {
        0%, 100% { opacity: .3; transform: scale(.8); }
        50%       { opacity: 1;  transform: scale(1.2); }
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0; }
      }
      @keyframes scanline {
        0%   { top: -4px; }
        100% { top: 100%; }
      }
      @keyframes fadein {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* ── Scanline effect ────────────────────────────────── */
      .scanline {
        position: fixed;
        left: 0; right: 0;
        height: 4px;
        background: linear-gradient(transparent, rgba(249,115,22,.06), transparent);
        pointer-events: none;
        z-index: 1;
        animation: scanline 8s linear infinite;
      }

      /* ── App wrapper (passed down to React) ─────────────── */
      #app-wrapper {
        position: relative;
        z-index: 1;
        animation: fadein .4s ease .2s both;
      }

      /* ── Selection color ────────────────────────────────── */
      ::selection {
        background: rgba(249,115,22,.25);
        color: var(--text);
      }

      /* ── React component globals ────────────────────────── */
      select option { background: var(--panel); }
    </style>
  </head>
  <body>

    <!-- Animated scanline overlay -->
    <div class="scanline"></div>

    <!-- Splash / loading screen -->
    <div id="splash">
      <div class="splash-icon">
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="32" cy="32" r="30" stroke="#f97316" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.4"/>
          <circle cx="32" cy="32" r="22" stroke="#f97316" stroke-width="1" opacity="0.3"/>
          <circle cx="32" cy="32" r="4" fill="#f97316"/>
          <line x1="32" y1="2"  x2="32" y2="14" stroke="#f97316" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="32" y1="50" x2="32" y2="62" stroke="#f97316" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="2"  y1="32" x2="14" y2="32" stroke="#f97316" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="50" y1="32" x2="62" y2="32" stroke="#f97316" stroke-width="1.5" stroke-linecap="round"/>
          <circle cx="32" cy="32" r="10" stroke="#a371f7" stroke-width="1" stroke-dasharray="2 2" opacity="0.6"/>
        </svg>
      </div>
      <div class="splash-title"><span class="accent">MINI</span>&nbsp;BURP</div>
      <div class="splash-sub">Security Scanner — Community Edition</div>
      <div class="splash-lines" id="splash-lines">
        <div class="splash-line" id="sl-1">Initializing engine...</div>
        <div class="splash-line" id="sl-2">Loading modules...</div>
        <div class="splash-line" id="sl-3">Checking proxy...</div>
        <div class="splash-line ok" id="sl-4">Ready.</div>
      </div>
      <div class="splash-bar"><div class="splash-bar-fill" id="splash-fill"></div></div>
    </div>

    <!-- React mounts here -->
    <div id="app-wrapper">
      <div id="root"></div>
    </div>

    <script type="module" src="/src/main.jsx"></script>

    <script>
      const steps = [
        { id: 'sl-1', delay: 200,  fill: 25 },
        { id: 'sl-2', delay: 550,  fill: 55 },
        { id: 'sl-3', delay: 900,  fill: 80 },
        { id: 'sl-4', delay: 1200, fill: 100 },
      ];
      steps.forEach(({ id, delay, fill }) => {
        setTimeout(() => {
          const el = document.getElementById(id);
          if (el) el.classList.add('show');
          const bar = document.getElementById('splash-fill');
          if (bar) bar.style.width = fill + '%';
        }, delay);
      });
      window.addEventListener('load', () => {
        setTimeout(() => {
          const s = document.getElementById('splash');
          if (s) s.classList.add('hidden');
        }, 1700);
      });
    </script>
  </body>
</html>
